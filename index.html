<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Asistente Fénix - Ayuda y Errores</title><style>body{margin:0;padding:10px;background:#1a1a2e;font-family:Arial,sans-serif}.chat-container{max-width:480px;margin:auto;border-radius:12px;background:#16213e;overflow:hidden;border:2px solid:#e94560}.chat-header{background:#e94560;color:#fff;padding:12px;text-align:center;font-weight:bold;font-size:18px;animation:brillo 1.5s infinite alternate}@keyframes brillo{from{text-shadow:0 0 5px #fff}to{text-shadow:0 0 12px #ffd700}}.chat-messages{height:320px;overflow-y:auto;padding:12px;background:#0f3460}.msg{margin:8px 0;padding:8px 12px;border-radius:8px;max-width:80%}.user{background:#e94560;color:#fff;margin-left:auto}.bot{background:#e0e0e0;color:#222;margin-right:auto}.input-area{display:flex;padding:8px;background:#16213e;border-top:1px solid:#444}#msg-input{flex:1;padding:8px;border-radius:6px;border:none;outline:none;font-size:14px}button{margin-left:6px;padding:8px 14px;border-radius:6px;border:none;background:#e94560;color:#fff;font-weight:bold;cursor:pointer}</style></head><body><div class="chat-container"><div class="chat-header">🤖 Asistente Fénix • Ayuda y Errores</div><div class="chat-messages" id="chatBox"></div><div class="input-area"><input type="text" id="msg-input" placeholder="Escribe tu problema o consulta..." autocomplete="off"><button onclick="enviarMsg()">Enviar</button></div></div><script>const respuestas={hola:"👋 ¡Hola! Soy tu **Asistente Fénix**, especializado en ayuda técnica y corrección de errores del proyecto. ¿Qué necesitas solucionar?","ayuda":"📋 Temas que resuelvo: código HTML/XML, Termux, Cordova, rutas de archivos, errores 404, fallos al pegar código, permisos y menús/marcadores.","termux":"🔧 Errores comunes: actualiza paquetes → `pkg update && pkg upgrade`; si fallan comandos revisa permisos y ruta de archivos; usa rutas cortas sin espacios.","cordova":"📱 Soluciones: verifica que estés en carpeta raíz del proyecto; instala requisitos → `npm install -g cordova`; si hay error de compilación revisa `config.xml` y rutas de recursos.","404":"❌ Causas: ruta mal escrita, archivo faltante o carpeta incorrecta. ✅ Solución: usa rutas relativas (`./archivo.html`), sin espacios ni mayúsculas innecesarias, verifica ubicación real.","codigo":"💡 Correcciones: revisa etiquetas abiertas/cerradas; limpia espacios/saltos extra; no pegues código con caracteres raros; en móvil usa editor sin formato para evitar errores.","archivos":"📂 Regla clave: todos los archivos en **una sola carpeta principal**, rutas simples, nombres cortos sin tildes ni espacios.","pegado":"⚠️ Error al pegar: borra espacios/símbolos extra; usa vista código plano; no copies desde documentos con formato.","compilar":"⚙️ Pasos: `cd ruta/proyecto` → `cordova prepare` → `cordova build android`; si falla revisa que no falten archivos ni permisos."};function enviarMsg(){const i=document.getElementById("msg-input"),m=i.value.trim();if(!m)return;agregarMsg(m,"user");i.value="";setTimeout(()=>{let r="ℹ️ Describe tu problema: ej: *error termux*, *error 404*, *fallo cordova*, *problema al pegar código*.";const b=m.toLowerCase();for(let p in respuestas)if(b.includes(p)){r=respuestas[p];break}agregarMsg(r,"bot")},350)}function agregarMsg(tx,tp){const d=document.createElement("div");d.className=`msg ${tp}`;d.innerHTML=tx;document.getElementById("chatBox").appendChild(d);d.parentElement.scrollTop=d.parentElement.scrollHeight}document.getElementById("msg-input").addEventListener("keydown",e=>e.key==="Enter"&&enviarMsg())</script></body></html>
